<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0d0d0f;
        --surface: #161618;
        --surface2: #1e1e22;
        --border: rgba(255,255,255,0.07);
        --border-hover: rgba(255,255,255,0.15);
        --text: #f0ede8;
        --text-muted: rgba(240,237,232,0.4);
        --accent: #e8c97e;
        --accent-dim: rgba(232,201,126,0.12);
        --accent-glow: rgba(232,201,126,0.25);
        --danger: #f87171;
        --danger-dim: rgba(248,113,113,0.1);
        --green: #6fcf97;
        --green-dim: rgba(111,207,151,0.1);
        --tag-colors: #c084fc, #60a5fa, #34d399, #fb923c, #f472b6;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px 80px;
      }

      /* Ambient background */
      body::before {
        content: '';
        position: fixed;
        top: -200px; left: 50%;
        transform: translateX(-50%);
        width: 600px; height: 600px;
        background: radial-gradient(ellipse, rgba(232,201,126,0.06) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .container {
        width: 100%;
        max-width: 620px;
        position: relative;
        z-index: 1;
      }

      /* Header */
      .header {
        margin-bottom: 40px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }

      .header-left h1 {
        font-family: 'Instrument Serif', serif;
        font-size: 42px;
        line-height: 1;
        color: var(--text);
        letter-spacing: -1px;
      }

      .header-left h1 em {
        font-style: italic;
        color: var(--accent);
      }

      .header-left p {
        margin-top: 6px;
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 300;
      }

      .stats-chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .chip {
        padding: 5px 11px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.4px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        transition: all 0.2s;
      }

      .chip.active { color: var(--accent); border-color: rgba(232,201,126,0.3); background: var(--accent-dim); }
      .chip.done { color: var(--green); border-color: rgba(111,207,151,0.3); background: var(--green-dim); }

      /* Input area */
      .input-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        transition: border-color 0.3s;
      }

      .input-card:focus-within {
        border-color: rgba(232,201,126,0.3);
        box-shadow: 0 0 0 4px var(--accent-dim);
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .main-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 400;
        padding: 4px 0;
      }

      .main-input::placeholder { color: var(--text-muted); }

      .add-btn {
        background: var(--accent);
        color: #0d0d0f;
        border: none;
        border-radius: 12px;
        padding: 10px 18px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      .add-btn:hover { background: #f0d89a; transform: translateY(-1px); }
      .add-btn:active { transform: translateY(0); }

      .add-btn svg { width: 14px; height: 14px; }

      /* Meta row (priority, tags) */
      .meta-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
      }

      .meta-label {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .priority-btns {
        display: flex;
        gap: 5px;
      }

      .priority-btn {
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
      }

      .priority-btn[data-p="low"].selected { color: var(--green); border-color: rgba(111,207,151,0.4); background: var(--green-dim); }
      .priority-btn[data-p="medium"].selected { color: var(--accent); border-color: rgba(232,201,126,0.4); background: var(--accent-dim); }
      .priority-btn[data-p="high"].selected { color: var(--danger); border-color: rgba(248,113,113,0.4); background: var(--danger-dim); }
      .priority-btn:not(.selected):hover { color: var(--text); border-color: var(--border-hover); }

      .tag-input {
        flex: 1;
        min-width: 100px;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        padding: 4px 0;
      }

      .tag-input::placeholder { color: var(--text-muted); }

      /* Controls bar */
      .controls-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 7px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-btn.active {
        color: var(--text);
        border-color: var(--border-hover);
        background: var(--surface2);
      }

      .filter-btn:hover:not(.active) { color: var(--text); }

      .spacer { flex: 1; }

      .sort-select {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-muted);
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        padding: 7px 10px;
        outline: none;
        cursor: pointer;
      }

      .clear-btn {
        padding: 7px 14px;
        border-radius: 10px;
        border: 1px solid rgba(248,113,113,0.2);
        background: var(--danger-dim);
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: var(--danger);
        cursor: pointer;
        transition: all 0.15s;
        display: none;
      }

      .clear-btn.visible { display: block; }
      .clear-btn:hover { background: rgba(248,113,113,0.2); }

      /* Search */
      .search-wrapper {
        position: relative;
        margin-bottom: 16px;
      }

      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        width: 14px;
        height: 14px;
      }

      .search-input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        padding: 10px 14px 10px 36px;
        outline: none;
        transition: border-color 0.2s;
      }

      .search-input::placeholder { color: var(--text-muted); }
      .search-input:focus { border-color: var(--border-hover); }

      /* List */
      .list-wrapper {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        transition: all 0.2s;
        animation: slideIn 0.25s ease;
        cursor: default;
        position: relative;
        overflow: hidden;
      }

      .item::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        border-radius: 0 2px 2px 0;
        background: transparent;
        transition: background 0.2s;
      }

      .item[data-priority="high"]::before { background: var(--danger); }
      .item[data-priority="medium"]::before { background: var(--accent); }
      .item[data-priority="low"]::before { background: var(--green); }

      .item:hover { border-color: var(--border-hover); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeOut {
        to { opacity: 0; transform: scale(0.95); }
      }

      .item.removing { animation: fadeOut 0.2s ease forwards; }

      /* Checkbox */
      .checkbox {
        width: 20px; height: 20px;
        border-radius: 6px;
        border: 1.5px solid var(--border-hover);
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .checkbox:hover { border-color: var(--accent); }
      .checkbox.checked { background: var(--green); border-color: var(--green); }
      .checkbox svg { display: none; width: 11px; height: 11px; stroke: #0d0d0f; stroke-width: 2.5; }
      .checkbox.checked svg { display: block; }

      /* Item content */
      .item-body { flex: 1; min-width: 0; }

      .item-text {
        font-size: 14px;
        font-weight: 400;
        color: var(--text);
        transition: all 0.2s;
        word-break: break-word;
        cursor: text;
        outline: none;
        border-bottom: 1px solid transparent;
      }

      .item-text:focus { border-bottom-color: var(--accent); }
      .item-text.completed { text-decoration: line-through; color: var(--text-muted); }

      .item-tags {
        display: flex;
        gap: 5px;
        margin-top: 5px;
        flex-wrap: wrap;
      }

      .tag {
        padding: 2px 8px;
        border-radius: 5px;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.3px;
        background: rgba(255,255,255,0.06);
        color: var(--text-muted);
        border: 1px solid var(--border);
      }

      .item-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .priority-dot {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 3px 8px;
        border-radius: 6px;
        opacity: 0.8;
      }

      .priority-dot[data-p="high"] { color: var(--danger); background: var(--danger-dim); }
      .priority-dot[data-p="medium"] { color: var(--accent); background: var(--accent-dim); }
      .priority-dot[data-p="low"] { color: var(--green); background: var(--green-dim); }

      .item-date {
        font-size: 10px;
        color: var(--text-muted);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .item:hover .item-date { opacity: 1; }

      .del-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        border-radius: 6px;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        opacity: 0;
        transition: opacity 0.2s, color 0.15s, background 0.15s;
      }

      .item:hover .del-btn { opacity: 1; }
      .del-btn:hover { color: var(--danger); background: var(--danger-dim); }
      .del-btn svg { width: 14px; height: 14px; }

      /* Empty state */
      .empty {
        text-align: center;
        padding: 60px 20px;
        display: none;
      }

      .empty.visible { display: block; }

      .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.3;
      }

      .empty h3 {
        font-family: 'Instrument Serif', serif;
        font-size: 22px;
        color: var(--text-muted);
        font-weight: 400;
        margin-bottom: 6px;
      }

      .empty p { font-size: 13px; color: var(--text-muted); opacity: 0.6; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 13px;
        color: var(--text);
        z-index: 100;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast.show { transform: translateX(-50%) translateY(0); }

      /* Progress bar */
      .progress-bar {
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 20px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--green));
        border-radius: 2px;
        transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        width: 0%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="header-left">
          <h1>Wish<em>list</em></h1>
          <p>Capture everything. Miss nothing.</p>
        </div>
        <div class="stats-chips">
          <div class="chip active" id="chip-total">0 total</div>
          <div class="chip done" id="chip-done">0 done</div>
        </div>
      </div>

      <!-- Input card -->
      <div class="input-card">
        <div class="input-row">
          <input class="main-input" id="item-input" type="text" placeholder="What do you wish for?" autocomplete="off" />
          <button class="add-btn" id="add-btn">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add
          </button>
        </div>
        <div class="meta-row">
          <span class="meta-label">Priority</span>
          <div class="priority-btns">
            <button class="priority-btn" data-p="low">Low</button>
            <button class="priority-btn selected" data-p="medium">Medium</button>
            <button class="priority-btn" data-p="high">High</button>
          </div>
          <span class="meta-label" style="margin-left:6px">Tag</span>
          <input class="tag-input" id="tag-input" placeholder="e.g. travel, tech..." />
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input class="search-input" id="search-input" placeholder="Search your wishlist..." />
      </div>

      <!-- Controls -->
      <div class="controls-bar">
        <button class="filter-btn active" data-f="all">All</button>
        <button class="filter-btn" data-f="active">Active</button>
        <button class="filter-btn" data-f="completed">Completed</button>
        <div class="spacer"></div>
        <select class="sort-select" id="sort-select">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="priority">Priority</option>
          <option value="az">A–Z</option>
        </select>
        <button class="clear-btn" id="clear-btn">Clear done</button>
      </div>

      <!-- List -->
      <div class="list-wrapper" id="item-list"></div>
      <div class="empty" id="empty-state">
        <div class="empty-icon">✦</div>
        <h3>Nothing here yet</h3>
        <p>Add your first wish above to get started</p>
      </div>

      <!-- Progress -->
      <div class="progress-bar" id="progress-bar" style="display:none">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const itemInput = document.getElementById('item-input');
      const tagInput = document.getElementById('tag-input');
      const addBtn = document.getElementById('add-btn');
      const listEl = document.getElementById('item-list');
      const emptyEl = document.getElementById('empty-state');
      const searchInput = document.getElementById('search-input');
      const sortSelect = document.getElementById('sort-select');
      const clearBtn = document.getElementById('clear-btn');
      const chipTotal = document.getElementById('chip-total');
      const chipDone = document.getElementById('chip-done');
      const progressBar = document.getElementById('progress-bar');
      const progressFill = document.getElementById('progress-fill');

      let items = [];
      let filter = 'all';
      let selectedPriority = 'medium';

      // Priority buttons
      document.querySelectorAll('.priority-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedPriority = btn.dataset.p;
        });
      });

      // Filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filter = btn.dataset.f;
          render();
        });
      });

      sortSelect.addEventListener('change', render);
      searchInput.addEventListener('input', render);

      clearBtn.addEventListener('click', () => {
        const count = items.filter(i => i.completed).length;
        items = items.filter(i => !i.completed);
        save();
        render();
        showToast(`🗑️ Cleared ${count} completed item${count !== 1 ? 's' : ''}`);
      });

      async function load() {
        try {
          const res = await fetch('/api/items');
          items = await res.json();
        } catch { items = []; }
        render();
      }

      async function save() {
        try {
          await fetch('/api/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(items),
          });
        } catch {}
      }

      function getFiltered() {
        const q = searchInput.value.trim().toLowerCase();
        let list = [...items];

        if (filter === 'active') list = list.filter(i => !i.completed);
        else if (filter === 'completed') list = list.filter(i => i.completed);

        if (q) list = list.filter(i =>
          i.text.toLowerCase().includes(q) ||
          (i.tag && i.tag.toLowerCase().includes(q))
        );

        const sortVal = sortSelect.value;
        const pOrder = { high: 0, medium: 1, low: 2 };
        if (sortVal === 'priority') list.sort((a, b) => pOrder[a.priority] - pOrder[b.priority]);
        else if (sortVal === 'az') list.sort((a, b) => a.text.localeCompare(b.text));
        else if (sortVal === 'oldest') list.sort((a, b) => a.id - b.id);
        else list.sort((a, b) => b.id - a.id);

        return list;
      }

      function render() {
        const visible = getFiltered();
        const done = items.filter(i => i.completed).length;

        // Stats
        chipTotal.textContent = `${items.length} total`;
        chipDone.textContent = `${done} done`;

        // Progress
        if (items.length > 0) {
          progressBar.style.display = 'block';
          progressFill.style.width = ((done / items.length) * 100) + '%';
        } else {
          progressBar.style.display = 'none';
        }

        // Clear completed button
        clearBtn.classList.toggle('visible', done > 0);

        // Empty state
        emptyEl.classList.toggle('visible', visible.length === 0);

        listEl.innerHTML = '';
        visible.forEach(item => {
          const realIdx = items.findIndex(i => i.id === item.id);
          const li = document.createElement('div');
          li.className = 'item';
          li.dataset.priority = item.priority || 'medium';

          const date = new Date(item.id).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

          li.innerHTML = `
            <div class="checkbox ${item.completed ? 'checked' : ''}" data-idx="${realIdx}">
              <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polyline points="1.5,6 5,9.5 10.5,2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-body">
              <div class="item-text ${item.completed ? 'completed' : ''}" contenteditable="true" data-idx="${realIdx}">${escHtml(item.text)}</div>
              ${item.tag ? `<div class="item-tags"><span class="tag">${escHtml(item.tag)}</span></div>` : ''}
            </div>
            <div class="item-meta">
              ${item.priority && item.priority !== 'medium' ? `<span class="priority-dot" data-p="${item.priority}">${item.priority}</span>` : ''}
              <span class="item-date">${date}</span>
            </div>
            <button class="del-btn" data-idx="${realIdx}">
              <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          `;

          // Checkbox
          li.querySelector('.checkbox').addEventListener('click', async () => {
            items[realIdx].completed = !items[realIdx].completed;
            await save();
            render();
          });

          // Delete
          li.querySelector('.del-btn').addEventListener('click', async () => {
            li.classList.add('removing');
            setTimeout(async () => {
              items.splice(realIdx, 1);
              await save();
              render();
            }, 200);
          });

          // Inline edit
          const textEl = li.querySelector('.item-text');
          textEl.addEventListener('blur', async () => {
            const newText = textEl.textContent.trim();
            if (newText && newText !== items[realIdx].text) {
              items[realIdx].text = newText;
              await save();
              showToast('✏️ Item updated');
            }
          });

          textEl.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
            if (e.key === 'Escape') { textEl.textContent = items[realIdx].text; textEl.blur(); }
          });

          listEl.appendChild(li);
        });
      }

      addBtn.addEventListener('click', async () => {
        const text = itemInput.value.trim();
        if (!text) { itemInput.focus(); return; }
        const tag = tagInput.value.trim();
        items.push({ id: Date.now(), text, tag, priority: selectedPriority, completed: false });
        itemInput.value = '';
        tagInput.value = '';
        await save();
        render();
        showToast('✦ Added to wishlist');
      });

      itemInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
      tagInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });

      function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      let toastTimer;
      function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
      }

      load();
    </script>
  </body>
</html>
